<script>
(function() {
  var pref = localStorage.getItem('feng_lang_pref');
  if (pref) return;

  var browserLang = (navigator.language || navigator.userLanguage || '').toLowerCase();
  var path = window.location.pathname;
  var isOnZhSite = path.startsWith('/zh/') || path === '/zh';

  if (browserLang.startsWith('zh') && !isOnZhSite) {
    var banner = document.createElement('div');
    banner.id = 'lang-banner';
    banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:var(--primary);color:var(--theme);text-align:center;padding:10px 16px;font-size:14px;z-index:9999;cursor:pointer;transition:opacity .3s';
    var targetUrl = '/zh' + (path === '/' ? '' : path);
    banner.innerHTML = '🌏 <a href="' + targetUrl + '" style="color:inherit;text-decoration:underline;font-weight:600;">切换到简体中文</a>&nbsp;&nbsp;<span id="lang-banner-dismiss" style="opacity:.6;cursor:pointer;margin-left:12px;">✕</span>';
    document.body.appendChild(banner);
    document.getElementById('lang-banner-dismiss').addEventListener('click', function(e) {
      e.stopPropagation();
      banner.style.opacity = '0';
      setTimeout(function() { banner.remove(); }, 300);
      localStorage.setItem('feng_lang_pref', 'en');
    });
  }

  if ((browserLang.startsWith('en') || !browserLang) && isOnZhSite) {
    var bannerEn = document.createElement('div');
    bannerEn.id = 'lang-banner';
    bannerEn.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:var(--primary);color:var(--theme);text-align:center;padding:10px 16px;font-size:14px;z-index:9999;cursor:pointer;transition:opacity .3s';
    var enPath = path.replace(/^\/zh(\/|$)/, '/') || '/';
    bannerEn.innerHTML = '🌏 <a href="' + enPath + '" style="color:inherit;text-decoration:underline;font-weight:600;">Switch to English</a>&nbsp;&nbsp;<span id="lang-banner-en-dismiss" style="opacity:.6;cursor:pointer;margin-left:12px;">✕</span>';
    document.body.appendChild(bannerEn);
    document.getElementById('lang-banner-en-dismiss').addEventListener('click', function(e) {
      e.stopPropagation();
      bannerEn.style.opacity = '0';
      setTimeout(function() { bannerEn.remove(); }, 300);
      localStorage.setItem('feng_lang_pref', 'zh');
    });
  }
})();
</script>
